name: Verificar Ruta Verde

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Revisar TypeScript
        run: |
          set -o pipefail
          npx tsc --noEmit 2>&1 | tee typecheck.log

      - name: Guardar diagnóstico TypeScript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-log
          path: typecheck.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Construir aplicación
        run: npm run build
