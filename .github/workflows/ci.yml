name: Validar Ruta Verde

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Revisar código
        id: lint
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee lint.log

      - name: Compilar y ejecutar pruebas
        id: test
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test.log

      - name: Guardar informes de validación
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-validation-logs
          path: |
            lint.log
            test.log
          retention-days: 3

      - name: Confirmar validación
        if: always()
        run: |
          test "${{ steps.lint.outcome }}" = "success"
          test "${{ steps.test.outcome }}" = "success"
