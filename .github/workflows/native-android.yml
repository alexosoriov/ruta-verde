name: Validar Android nativo

on:
  pull_request:
    paths:
      - "native/android/**"
      - "tests/native-shell.test.mjs"
      - ".github/workflows/native-android.yml"
  push:
    branches: [main]
    paths:
      - "native/android/**"
      - "tests/native-shell.test.mjs"
      - ".github/workflows/native-android.yml"

permissions:
  contents: read

concurrency:
  group: native-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Gradle 9.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.0"

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar plataforma Android estable
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Compilar APK de prueba
        run: gradle -p native/android :app:assembleDebug --stacktrace

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: ruta-verde-android-debug
          path: native/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7
